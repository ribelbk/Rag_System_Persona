services:
  - type: web
    name: rag-system-persona
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: HAYSTACK_TELEMETRY_ENABLED
        value: "False"
